<!DOCTYPE html>
<html>
<head>
    <title>Umdeni Health Lite</title>
</head>
<body>

    <h1>Umdeni Health Lite</h1>
    <p>Who is collecting medicine for gogo?</p>

    <input type="text" id="nameInput" placeholder="Enter your name">

    <input type="text" id="medInput" placeholder="Which medication are you collecting?">

    <select id="roleSelect">
        <option value="Me">Me</option>
        <option value="Family Member">Family Member</option>
        <option value="Caregiver">Caregiver</option>
    </select>

    <select id="urgency">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
    </select>

    <button onclick="submitForm()">Submit</button>

    <p id="output"></p>

    <script>
        function submitForm() {
            let name = document.getElementById("nameInput").value;
            let role = document.getElementById("roleSelect").value;
            let med = document.getElementById("medInput").value;
            let urgency = document.getElementById("urgency").value;

            if (name === "") {
                document.getElementById("output").innerText = "Please enter your name";
                return;
            }

            let message = name + " is collecting " + med + " as a " + role + " (Urgency: " + urgency + ")";

            if (urgency === "High") {
                message += " This is urgent. Please go to the clinic as soon as possible.";
            }

            document.getElementById("output").innerText = message;
        }
    </script>

</body>
</html>
